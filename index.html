<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Movie Explorer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h2 class="logo">StreamFlix</h2>

<h1>🎬 Global Movie Explorer</h1>

<input id="search" placeholder="Search movies...">

<div class="right-header">

<button class="auth-btn" onclick="openLogin()">Login</button>
<button class="auth-btn" onclick="openSignup()">Signup</button>

</div>

</header>

<div class="movie-grid" id="movieGrid"></div>

<p id="notFound" class="notfound">Movie is currently not available</p>

<div class="pagination">
<button class="page-btn" onclick="changePage(1)">Hollywood</button>
<button class="page-btn" onclick="changePage(2)">Bollywood</button>
<button class="page-btn" onclick="changePage(3)">Kollywood</button>
</div>


<div id="trailerModal" class="modal">

<div class="modal-content">
<span class="close" onclick="closeTrailer()">✖</span>
<iframe id="trailerFrame" allowfullscreen></iframe>
</div>
</div>



<div id="loginModal" class="modal">
<div class="modal-content auth">
<h2>Login</h2>
<input placeholder="Email">
<input placeholder="Password" type="password">
<button>Login</button>
<p onclick="switchToSignup()">No account? Signup</p>
</div>
</div>

<div id="signupModal" class="modal">
<div class="modal-content auth">
<h2>Signup</h2>

<input placeholder="Name">
<input placeholder="Email">
<input placeholder="Password" type="password">

<button>Create Account</button>

<p onclick="switchToLogin()">Already have account? Login</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
